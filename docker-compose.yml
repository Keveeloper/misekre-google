version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: misekre-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin_pwd}
      POSTGRES_DB: ${DB_NAME:-misekredb}
      TZ: America/Bogota
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
